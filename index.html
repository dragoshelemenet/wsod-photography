<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Choose language | WSOD Photography</title>
  <meta name="description" content="Choose English or Romanian to open the Bucharest photography portfolio." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://dragoshelemenet.github.io/wsod-photography/" />
  <link rel="alternate" hreflang="en" href="https://dragoshelemenet.github.io/wsod-photography/en/" />
  <link rel="alternate" hreflang="ro" href="https://dragoshelemenet.github.io/wsod-photography/ro/" />
  <link rel="alternate" hreflang="x-default" href="https://dragoshelemenet.github.io/wsod-photography/en/" />
  <link rel="stylesheet" href="/wsod-photography/assets/styles.css" />
  <script defer src="/wsod-photography/assets/site.js"></script>
</head>
<body>
  <main class="site-shell">
    <section class="chooser-hero">
      <div class="chooser-card">
        <img src="https://wsod-media.fra1.cdn.digitaloceanspaces.com/uploads/wsod-prod/brand-logo/1775950777173--wsod-prod-.png" alt="WSOD Photography" class="logo-image chooser-logo" width="260" height="130" loading="eager" decoding="async" />
        <h1>WSOD Photography</h1>
        <p>Choose your language to open the Bucharest photography portfolio.</p>
        <nav class="language-nav" aria-label="Language switcher">
          <a href="/wsod-photography/en/">English</a>
          <a href="/wsod-photography/ro/">Română</a>
        </nav>
      </div>
    </section>

    <section class="compact-carousel-section" aria-label="Photo carousel">
      <div class="compact-carousel" data-compact-carousel data-interval="3200">
        <button type="button" class="compact-carousel-nav compact-carousel-prev" data-carousel-prev aria-label="Previous image">‹</button>
        <div class="compact-carousel-viewport">
          <article class="compact-slide" data-slide data-index="0"><button type="button" class="compact-slide-button"><img src="/wsod-photography/assets/placeholder.svg" alt="Fabulous portrait photography by WSOD Photography" class="compact-slide-image" width="1200" height="1500" loading="eager" decoding="async" /><span class="compact-slide-overlay"></span><span class="compact-slide-text">Fabulous images</span></button></article>
          <article class="compact-slide" data-slide data-index="1"><button type="button" class="compact-slide-button"><img src="/wsod-photography/assets/placeholder.svg" alt="Elegant city walk portraits in Bucharest" class="compact-slide-image" width="1200" height="1500" loading="lazy" decoding="async" /><span class="compact-slide-overlay"></span><span class="compact-slide-text">City walk moments</span></button></article>
          <article class="compact-slide" data-slide data-index="2"><button type="button" class="compact-slide-button"><img src="/wsod-photography/assets/placeholder.svg" alt="Modern tourist photography in Bucharest" class="compact-slide-image" width="1200" height="1500" loading="lazy" decoding="async" /><span class="compact-slide-overlay"></span><span class="compact-slide-text">Tourist photography</span></button></article>
        </div>
        <button type="button" class="compact-carousel-nav compact-carousel-next" data-carousel-next aria-label="Next image">›</button>
      </div>
    </section>
  </main>
</body>
</html>
